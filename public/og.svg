<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="ScreenCam - Capture sharp. Direct the frame.">
  <defs>
    <radialGradient id="lens" cx="66%" cy="45%" r="56%">
      <stop offset="0%" stop-color="#f52b2f" stop-opacity="0.44"/>
      <stop offset="38%" stop-color="#601014" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#191919"/>
      <stop offset="100%" stop-color="#090909"/>
    </linearGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M58 0H0V58" fill="none" stroke="#f4eee2" stroke-opacity="0.055"/>
    </pattern>
    <pattern id="dots" width="62" height="62" patternUnits="userSpaceOnUse">
      <circle cx="31" cy="31" r="3.5" fill="#f4eee2" fill-opacity="0.18"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#050505"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.8"/>
  <circle cx="806" cy="284" r="252" fill="url(#lens)" filter="url(#soft)"/>
  <circle cx="806" cy="284" r="150" fill="none" stroke="#f52b2f" stroke-opacity="0.52" stroke-width="2"/>
  <circle cx="806" cy="284" r="212" fill="none" stroke="#f4eee2" stroke-opacity="0.16" stroke-width="2"/>

  <image href="app-icon-512.png" x="80" y="74" width="122" height="122" preserveAspectRatio="xMidYMid meet"/>
  <text x="82" y="274" fill="#f52b2f" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="900">NATIVE MACOS CAPTURE STUDIO</text>
  <text x="78" y="382" fill="#f4eee2" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="74" font-weight="950">Capture sharp.</text>
  <text x="78" y="466" fill="#f4eee2" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="74" font-weight="950">Direct the frame.</text>

  <g transform="translate(718 156)">
    <rect x="0" y="0" width="390" height="288" rx="8" fill="url(#panel)" stroke="#f4eee2" stroke-opacity="0.2"/>
    <rect x="22" y="24" width="346" height="178" rx="8" fill="#0d0d0d" stroke="#f4eee2" stroke-opacity="0.15"/>
    <path d="M58 76h134M58 114h188" stroke="#f4eee2" stroke-opacity="0.72" stroke-width="13" stroke-linecap="round"/>
    <rect x="58" y="148" width="158" height="32" rx="16" fill="#f52b2f" fill-opacity="0.86"/>
    <circle cx="284" cy="104" r="52" fill="none" stroke="#f52b2f" stroke-width="4"/>
    <circle cx="284" cy="104" r="22" fill="none" stroke="#f4eee2" stroke-opacity="0.42" stroke-width="2"/>
    <rect x="22" y="222" width="346" height="42" rx="8" fill="#090909" stroke="#f4eee2" stroke-opacity="0.12"/>
    <rect x="40" y="238" width="96" height="9" rx="5" fill="#f52b2f"/>
    <rect x="152" y="238" width="134" height="9" rx="5" fill="#f4eee2" fill-opacity="0.5"/>
    <rect x="302" y="238" width="46" height="9" rx="5" fill="#f4eee2" fill-opacity="0.22"/>
    <path d="M208 222v42" stroke="#f4eee2" stroke-width="2"/>
  </g>

  <text x="82" y="560" fill="#aaa39a" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="760">Retina capture · Manual lens · Curve tuning · Preview-accurate export</text>
</svg>
